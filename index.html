<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Rabah Loudjani</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #333;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    nav {
      background: #444;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
    }
    .container {
      width: 80%;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
    }
    h2 {
      color: #007BFF;
    }
    #chat-output, #output {
      margin-top: 10px;
      white-space: pre-line;
      background: #f0f0f0;
      padding: 10px;
      border-radius: 5px;
    }
    button {
      margin-top: 10px;
      padding: 10px 15px;
      background: #007BFF;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    input {
      padding: 8px;
      width: 70%;
    }
    .portrait {
      text-align: center;
      margin: 20px 0;
    }
    .portrait img {
      border-radius: 50%;
      width: 150px;
    }
  </style>
</head>
<body>

<header>
  <h1>Bienvenue sur mon Portfolio</h1>
</header>

<nav>
  <a href="#">Accueil</a>
  <a href="#">À propos</a>
  <a href="#">Contact</a>
</nav>

<div class="container">
  <!-- Portrait -->
  <div class="portrait">
    <img src="portrait.jpg" alt="Portrait Rabah Loudjani">
    <p>Passionné par les nouvelles technologies<br>
    Un passionné des nouvelles technologies qui transforme les idées en innovations ! 🚀</p>
    <button>Ma bibliothèque numérique</button>
  </div>

  <!-- Lecteur radio -->
  <h2>Stations de radio</h2>
  <audio controls>
    <source src="radio1.mp3" type="audio/mpeg">
    Votre navigateur ne supporte pas l'audio.
  </audio>
  <select>
    <option>Europe 1</option>
    <option>RTBF</option>
    <option>Pure</option>
  </select>

  <!-- Agent IA Textuel -->
  <h2>Agent IA Textuel</h2>
  <input type="text" id="user-input" placeholder="Pose-moi une question...">
  <button id="send-btn">Envoyer</button>
  <div id="chat-output"></div>

  <!-- Agent IA Vocal -->
  <h2>Agent IA Vocal</h2>
  <button id="start-btn">🎙️ Activer l’agent vocal</button>
  <div id="output"></div>
</div>

<script>
  // --- Configuration API GPT/Mistral ---
  const API_URL = "https://api.mistral.ai/v1/chat/completions"
  const API_KEY = "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"

  async function getAgentReply(userMessage) {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: "mistral-medium", // ou gpt-4o-mini si OpenAI
        messages: [{ role: "user", content: userMessage }]
      })
    });
    const data = await response.json();
    return data.choices[0].message.content;
  }

  // --- Agent IA Textuel ---
  const sendBtn = document.getElementById("send-btn");
  const userInput = document.getElementById("user-input");
  const chatOutput = document.getElementById("chat-output");

  sendBtn.addEventListener("click", async () => {
    const question = userInput.value;
    if (!question) return;
    chatOutput.textContent += "Vous: " + question + "\n";

    const reply = await getAgentReply(question);
    chatOutput.textContent += "Agent IA: " + reply + "\n";
    userInput.value = "";
  });

  // --- Agent IA Vocal ---
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const synth = window.speechSynthesis;

  if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.lang = "fr-FR";
    recognition.interimResults = false;

    const startBtn = document.getElementById("start-btn");
    const output = document.getElementById("output");

    startBtn.addEventListener("click", () => {
      recognition.start();
    });

    recognition.onresult = async (event) => {
      const userSpeech = event.results[0][0].transcript;
      output.textContent = "Vous avez dit : " + userSpeech;

      const agentReply = await getAgentReply(userSpeech);
      output.textContent += "\nAgent IA : " + agentReply;

      const utterance = new SpeechSynthesisUtterance(agentReply);
      utterance.lang = "fr-FR";
      utterance.rate = 1;
      utterance.pitch = 1;
      synth.speak(utterance);
    };

    recognition.onerror = (event) => {
      output.textContent = "Erreur : " + event.error;
    };
  } else {
    alert("Votre navigateur ne supporte pas la reconnaissance vocale.");
  }
</script>

</body>
</html>
