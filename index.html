<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio | Connexion sécurisée</title>
    <!-- Redirection de secours si JavaScript est désactivé -->
    <meta http-equiv="refresh" content="9; url=https://precious-taffy-d2caa1.netlify.app/">
    
    <!-- Importation d'une police moderne -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 85%;
        }

        h1 { 
            font-size: 28px; 
            font-weight: 800; 
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p { 
            color: rgba(255, 255, 255, 0.8); 
            font-size: 15px; 
            line-height: 1.6; 
        }

        .countdown {
            font-size: 14px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 50px;
            display: inline-block;
            margin: 15px 0;
            color: #fff;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 32px;
            background-color: #ffffff;
            color: #b21f1f;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.4);
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Bienvenue sur mon Portfolio</h1>
        <p>Initialisation de l'environnement et de l'agent IA (vocal & textuel)...</p>
        
        <!-- Zone du décompte dynamique -->
        <div class="countdown" id="timer">Redirection dans 9s</div>
        
        <br>
        <a href="https://precious-taffy-d2caa1.netlify.app/" class="btn">Entrer immédiatement</a>
    </div>

    <script>
        // Petit script sympa pour animer le texte du décompte
        let seconds = 9;
        const timerElement = document.getElementById('timer');
        
        const interval = setInterval(() => {
            seconds--;
            if (seconds > 0) {
                timerElement.textContent = `Redirection dans ${seconds}s`;
            } else {
                timerElement.textContent = "Connexion...";
                clearInterval(interval);
                window.location.href = "https://precious-taffy-d2caa1.netlify.app/";
            }
        }, 1000);
    </script>

</body>
</html>
