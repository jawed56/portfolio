<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio | Connexion sécurisée</title>
    <meta http-equiv="refresh" content="9; url=https://precious-taffy-d2caa1.netlify.app/">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top right, #1e293b 0%, #111827 60%, #0f172a 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* --- ÉMOJIS ATTENTIFS COMPACTS ET DYNAMIQUES --- */
        .attentive-emoji {
            position: absolute;
            font-size: 130px;
            opacity: 0.18;
            filter: blur(1px);
            z-index: 1;
            pointer-events: none;
        }

        /* Le Robot - Animation accélérée à 4 secondes */
        .emoji-robot {
            top: 15%;
            left: 10%;
            animation: floatRobot 4s ease-in-out infinite alternate;
        }

        /* Le Visage Pensif - Animation accélérée à 5 secondes */
        .emoji-thinking {
            bottom: 15%;
            right: 10%;
            animation: floatThinking 5s ease-in-out infinite alternate;
        }

        /* Trajectoires légèrement ajustées pour un effet plus rythmé */
        @keyframes floatRobot {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(70px, 50px) scale(1.1) rotate(12deg); }
        }

        @keyframes floatThinking {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(-60px, -45px) scale(0.95) rotate(-8deg); }
        }

        /* --- CARTE EN VERRE DÉPOLI --- */
        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.09);
            padding: 50px 40px;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 460px;
            width: 85%;
            z-index: 2;
            position: relative;
        }

        h1 { 
            font-size: 30px; 
            font-weight: 800; 
            margin-top: 0;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 60%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { 
            color: rgba(255, 255, 255, 0.75); 
            font-size: 15px; 
            line-height: 1.6; 
            margin-bottom: 20px;
        }

        .countdown {
            font-size: 14px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 18px;
            border-radius: 50px;
            display: inline-block;
            margin: 10px 0 25px 0;
            color: #c7d2fe;
            letter-spacing: 0.5px;
        }

        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: #ffffff;
            color: #111827;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
            background: #f8f9fa;
        }
    </style>
</head>
<body>

    <div class="attentive-emoji emoji-robot">🤖</div>
    <div class="attentive-emoji emoji-thinking">🤔</div>

    <div class="card">
        <h1>Bienvenue sur mon Portfolio</h1>
        <p>Initialisation de l'environnement et de l'agent IA (vocal & textuel)...</p>
        
        <div class="countdown" id="timer">Redirection dans 9s</div>
        
        <br>
        <a href="https://precious-taffy-d2caa1.netlify.app/" class="btn">Entrer immédiatement</a>
    </div>

    <script>
        let seconds = 9;
        const timerElement = document.getElementById('timer');
        
        const interval = setInterval(() => {
            seconds--;
            if (seconds > 0) {
                timerElement.textContent = `Redirection dans ${seconds}s`;
            } else {
                timerElement.textContent = "Connexion...";
                clearInterval(interval);
                window.location.href = "https://precious-taffy-d2caa1.netlify.app/";
            }
        }, 1000);
    </script>

</body>
</html>
