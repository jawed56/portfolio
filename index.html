<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Rabah Loudjani — passionné de nouvelles technologies</title>

    <!-- Meta SEO -->
    <meta name="description" content="Portfolio officiel de Rabah Loudjani — passionné de nouvelles technologies. Découvrez ses ouvrages et son assistant IA interactif.">
    <meta property="og:title" content="Portfolio Rabah Loudjani">
    <meta property="og:description" content="Découvrez les ouvrages et l'assistant IA de Rabah Loudjani.">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: rgba(18, 24, 38, 0.75);
            --bg-card-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #ec4899;
            --accent-secondary: #8b5cf6;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            color: var(--text-main);
            background-color: var(--bg-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav { background: rgba(11, 15, 25, 0.8); padding: 1.2em 2em; position: sticky; top: 0; z-index: 100; }
        nav ul { list-style: none; display: flex; justify-content: center; gap: 2.5em; }
        nav ul li a { color: var(--text-muted); text-decoration: none; font-weight: 600; }

        .container { 
            max-width: 1000px; 
            width: 90%; 
            margin: 2.5em auto; 
            padding: 2.5em; 
            background: var(--bg-card); 
            border: 1px solid var(--bg-card-border);
            border-radius: 20px; 
        }

        #home { text-align: center; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--accent-secondary); }

        .audio-container { text-align: center; padding: 2em; background: rgba(30, 41, 59, 0.4); border-radius: 16px; margin: 2em auto; }

        #btn-biblio { background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary)); color: white; padding: 14px 28px; border: none; border-radius: 12px; cursor: pointer; }

        #ai-agent { 
            position: fixed; bottom: 20px; right: 20px; width: min(390px, 92vw); 
            background: #0f172a; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); z-index: 1000; 
        }
        #ai-header { background: linear-gradient(135deg, #1e1b4b, #311042); padding: 16px; cursor: pointer; }
        #ai-chat { height: 420px; overflow-y: auto; padding: 18px; display: none; flex-direction: column; gap: 14px; background: #0b0f19; }
        .ai-message { max-width: 85%; padding: 12px 16px; border-radius: 16px; }
        .ai-user { align-self: flex-end; background: var(--accent-primary); color: white; }
        .ai-bot { align-self: flex-start; background: #1e293b; color: #e2e8f0; }
        .error { background: #450a0a; color: #fca5a5; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#home">Accueil</a></li>
            <li><a href="#about">À propos</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <div class="audio-container">
        <p>Station de radio en direct :</p>
        <button id="play-audio">Activer le son</button>
        <audio id="radio-player" controls style="display:none;"></audio>
        <select id="station-select">
            <option value="">-- Choisir une station --</option>
            <option value="http://audio.bfmtv.com/rmcradio_128.mp3">RMC</option>
            <option value="http://icecast.radiofrance.fr/franceinfo-midfi.mp3">Franceinfo</option>
        </select>
    </div>

    <div class="container">
        <section id="home">
            <h1>Rabah Loudjani</h1>
            <img src="photo.jpg" alt="Rabah Loudjani" class="profile-img">
            <p>Passionné par les nouvelles technologies</p>
        </section>

        <section id="about">
            <button id="btn-biblio">Ma bibliothèque numérique ▾</button>
            <div id="menu-biblio" style="display:none; margin-top:10px;">
                <a href="de-lexil-au-rejet.pdf" target="_blank">De l'exil au rejet</a><br>
                <a href="le-gout-de-linterdit.pdf" target="_blank">Le goût de l'interdit</a>
            </div>
        </section>
    </div>

    <!-- Agent IA -->
    <div id="ai-agent">
        <div id="ai-header">
            <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(#8b5cf6,#ec4899);display:flex;align-items:center;justify-content:center;font-size:20px;">🧠</div>
            <div>
                <strong>Agent IA Rabah</strong><br>
                <small style="color:#4ade80;">● En ligne</small>
            </div>
        </div>
        <div id="ai-chat"></div>
        <div id="ai-input-area" style="display:none;padding:12px;background:#0f172a;border-top:1px solid #334155;">
            <input type="text" id="ai-input" placeholder="Posez votre question..." style="flex:1;padding:12px;border-radius:24px;background:#1e293b;color:white;border:1px solid #475569;">
            <button id="ai-send" style="margin-left:8px;padding:12px 16px;background:#8b5cf6;color:white;border:none;border-radius:50%;cursor:pointer;">↑</button>
        </div>
    </div>

    <script>
        const GROQ_PROXY_URL = "https://portfolio.loudjani-r.workers.dev/groq";

        const chat = document.getElementById('ai-chat');
        const input = document.getElementById('ai-input');
        const sendBtn = document.getElementById('ai-send');
        const header = document.getElementById('ai-header');
        let isOpen = false;

        function addMessage(sender, text, className = '') {
            const msg = document.createElement('div');
            msg.className = `ai-message ${sender === 'user' ? 'ai-user' : 'ai-bot'} ${className}`;
            msg.textContent = text;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            addMessage('user', message);
            input.value = '';
            const thinking = addMessage('bot', "Je réfléchis...");

            try {
                const response = await fetch(GROQ_PROXY_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: message }],
                        temperature: 0.7,
                        max_tokens: 600
                    })
                });

                if (!response.ok) throw new Error();
                const data = await response.json();
                chat.removeChild(thinking);
                addMessage('bot', data.choices[0].message.content);
            } catch (err) {
                chat.removeChild(thinking);
                addMessage('bot', "❌ Erreur de connexion à l'IA.", "error");
            }
        }

        header.addEventListener('click', () => {
            isOpen = !isOpen;
            chat.style.display = isOpen ? 'flex' : 'none';
            document.getElementById('ai-input-area').style.display = isOpen ? 'flex' : 'none';
            if (isOpen && chat.children.length === 0) {
                addMessage('bot', "Bonjour ! Comment puis-je vous aider aujourd'hui ?");
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
