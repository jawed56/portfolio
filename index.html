<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio | Connexion sécurisée</title>
    <meta http-equiv="refresh" content="9; url=https://precious-taffy-d2caa1.netlify.app/">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0b0f19; /* Fond sombre uni pour faire ressortir les sphères */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* --- SPHÈRES LUMINEUSES BIEN VISIBLES ET EN MOUVEMENT --- */
        .glass-ball {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            opacity: 0.6;
            z-index: 1;
            pointer-events: none;
        }

        .ball-indigo {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #4f46e5 0%, rgba(79, 70, 229, 0) 70%);
            top: 10%;
            left: 15%;
            animation: floatIndigo 12s ease-in-out infinite alternate;
        }

        .ball-pink {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #db2777 0%, rgba(219, 39, 119, 0) 70%);
            bottom: 10%;
            right: 15%;
            animation: floatPink 15s ease-in-out infinite alternate;
        }

        @keyframes floatIndigo {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 50px) scale(1.2); }
        }

        @keyframes floatPink {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-80px, -60px) scale(1.1); }
        }

        /* --- CARTE EN VERRE ULTRA-TRANSPARENTE (GLASSMORPHISM CORRIGÉ) --- */
        .card {
            background: rgba(255, 255, 255, 0.03); /* Très transparent pour voir à travers */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px); /* Compatibilité Safari/iOS */
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 50px 40px;
            border-radius: 28px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.2);
            max-width: 460px;
            width: 85%;
            z-index: 10; /* Force la carte à passer devant */
            position: relative;
        }

        h1 { 
            font-size: 30px; 
            font-weight: 800; 
            margin-top: 0;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 60%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { 
            color: rgba(255, 255, 255, 0.75); 
            font-size: 15px; 
            line-height: 1.6; 
            margin-bottom: 20px;
        }

        .countdown {
            font-size: 14px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 18px;
            border-radius: 50px;
            display: inline-block;
            margin: 10px 0 25px 0;
            color: #c7d2fe;
        }

        /* --- BOUTON DE CONFIANCE --- */
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: #ffffff;
            color: #0b0f19;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
            background: #f8f9fa;
        }
    </style>
</head>
<body>

    <!-- Les deux néons en mouvement -->
    <div class="glass-ball ball-indigo"></div>
    <div class="glass-ball ball-pink"></div>

    <!-- La carte qui filtre le fond -->
    <div class="card">
        <h1>Bienvenue sur mon Portfolio</h1>
        <p>Initialisation de l'environnement et de l'agent IA (vocal & textuel)...</p>
        
        <div class="countdown" id="timer">Redirection dans 9s</div>
        
        <br>
        <a href="https://precious-taffy-d2caa1.netlify.app/" class="btn">Entrer immédiatement</a>
    </div>

    <script>
        let seconds = 9;
        const timerElement = document.getElementById('timer');
        
        const interval = setInterval(() => {
            seconds--;
            if (seconds > 0) {
                timerElement.textContent = `Redirection dans ${seconds}s`;
            } else {
                timerElement.textContent = "Connexion...";
                clearInterval(interval);
                window.location.href = "https://precious-taffy-d2caa1.netlify.app/";
            }
        }, 1000);
    </script>

</body>
</html>
