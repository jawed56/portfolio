<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio | Connexion sécurisée</title>
    <!-- Redirection automatique après 3 secondes -->
    <meta http-equiv="refresh" content="3; url=https://precious-taffy-d2caa1.netlify.app/">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 24px; }
        p { color: #7f8c8d; font-size: 16px; line-height: 1.5; }
        
        /* Petit effet de chargement animé */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }
        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(41, 128, 185, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Bienvenue sur mon Portfolio</h1>
        <div class="loader"></div>
        <p>Redirection en cours vers l'expérience complète en ligne...</p>
        <p style="font-size: 14px; font-style: italic; margin-bottom: 25px;">
            (Découvrez mon agent IA vocal et textuel intégré)
        </p>
        <a href="https://precious-taffy-d2caa1.netlify.app/" class="btn">Accéder directement</a>
    </div>

</body>
</html>
